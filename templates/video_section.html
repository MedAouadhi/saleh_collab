<!-- templates/video_section.html -->
<div x-data="videoSection()" x-init="initVideoSection()" class="bg-white p-6 rounded-lg shadow-md mt-6">
    <div class="flex justify-between items-center mb-4 border-b pb-2 cursor-pointer" @click="open = !open">
        <div>
            <h2 class="text-xl font-semibold text-gray-700">🎬 فيديوهات الحلقة</h2>
            <p class="text-sm text-gray-500 mt-1">
                <span x-text="scenes.length"></span> مشهد ·
                <span x-text="totalGenerations()"></span> توليد ·
                <span class="text-green-600" x-text="completedGenerations()"></span> مكتمل
                <template x-if="pendingGenerations() > 0">
                    <span class="text-blue-600">· <span x-text="pendingGenerations()"></span> قيد التوليد</span>
                </template>
            </p>
        </div>
        <span x-text="open ? '▼' : '◄'" class="text-gray-500 text-lg"></span>
    </div>

    <div x-show="open" x-transition>
        <!-- Loading state for models -->
        <div x-show="modelsLoading" class="text-center py-4 text-gray-500">
            جاري تحميل الموديلات...
        </div>
        <div x-show="modelsError" class="text-center py-4 text-red-500">
            <span x-text="modelsError"></span>
        </div>

        <!-- OpenRouter remaining credit -->
        <div class="mb-4 rounded-lg border border-indigo-200 bg-gradient-to-l from-indigo-50 to-white p-4 flex items-center justify-between flex-wrap gap-3">
            <div class="flex items-center gap-3">
                <span class="text-2xl">💶</span>
                <div>
                    <div class="text-xs text-gray-500">الرصيد المتبقي في OpenRouter</div>
                    <div x-show="creditsLoading" class="text-sm text-gray-400">جاري التحميل...</div>
                    <div x-show="creditsError" class="text-sm text-red-600" x-text="creditsError"></div>
                    <div x-show="!creditsLoading && !creditsError && credits" class="flex items-baseline gap-2">
                        <span class="text-2xl font-bold text-indigo-700" x-text="formatEur(credits && credits.remaining_eur)"></span>
                    </div>
                </div>
            </div>
            <button
                @click="fetchCredits()"
                :disabled="creditsLoading"
                class="text-xs bg-indigo-500 hover:bg-indigo-600 text-white py-1 px-3 rounded disabled:opacity-50"
            >🔄 تحديث</button>
        </div>

        <!-- Google Drive connection status -->
        <div x-show="driveChecked && !driveConnected" class="bg-yellow-50 border border-yellow-200 rounded p-3 mb-4 flex items-center justify-between">
            <div class="text-sm text-yellow-800">
                <span class="font-semibold">⚠️ Google Drive غير متصل</span>
                <span class="mr-2">— لن تتمكن من رفع الفيديوهات إلى Drive.</span>
            </div>
            <button
                @click="connectDrive()"
                class="bg-yellow-500 hover:bg-yellow-600 text-white text-xs py-1 px-3 rounded"
            >
                ربط Google Drive
            </button>
        </div>
        <div x-show="driveChecked && driveConnected" class="bg-green-50 border border-green-200 rounded p-3 mb-4 text-sm text-green-800">
            ✅ Google Drive متصل — يمكنك رفع الفيديوهات.
        </div>

        <!-- Scene list -->
        <template x-for="scene in scenes" :key="scene.id">
            <div class="mb-4 border rounded-lg overflow-hidden">
                <div class="bg-gray-50 px-4 py-2 flex justify-between items-center cursor-pointer" @click="scene.open = !scene.open">
                    <div class="flex items-center gap-3">
                        <h3 class="font-semibold text-gray-700" x-text="'مشهد ' + scene.number"></h3>
                        <span class="text-xs text-gray-500" x-text="scene.generations.length + ' محاولة'"></span>
                        <template x-if="scene.hasDraft">
                            <span class="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded" title="هناك مسودة محفوظة">📝 مسودة</span>
                        </template>
                    </div>
                    <div class="flex items-center gap-2">
                        <button
                            x-show="isAssigned || isAdmin"
                            @click.stop="deleteScene(scene.id)"
                            class="text-red-500 hover:text-red-700 text-sm"
                            title="حذف المشهد"
                        >🗑️</button>
                        <span x-text="scene.open ? '▼' : '◄'" class="text-gray-500"></span>
                    </div>
                </div>

                <div x-show="scene.open" x-transition class="p-4 space-y-4">
                    <!-- Generation Form -->
                    <div x-show="isAssigned || isAdmin" class="bg-gray-50 p-4 rounded">
                        <h4 class="text-sm font-semibold text-gray-600 mb-2">
                            <span x-text="scene.generations.length > 0 ? 'إنشاء محاولة جديدة' : 'توليد فيديو'"></span>
                        </h4>
                        <div class="space-y-2">
                            <textarea
                                x-model="scene.newPrompt"
                                rows="3"
                                class="w-full p-2 border rounded text-right"
                                placeholder="أدخل وصف الفيديو..."
                            ></textarea>
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                <select x-model="scene.newModel" @change="updateModelOptions(scene)" class="border rounded p-2">
                                    <option value="">-- اختر الموديل --</option>
                                    <template x-for="model in availableModels" :key="model.id">
                                        <option :value="model.id" x-text="model.name || model.id"></option>
                                    </template>
                                </select>
                                <select x-model="scene.newResolution" class="border rounded p-2">
                                    <option value="">-- الدقة --</option>
                                    <template x-for="res in scene.availableResolutions" :key="res">
                                        <option :value="res" x-text="res"></option>
                                    </template>
                                </select>
                                <select x-model="scene.newAspectRatio" class="border rounded p-2">
                                    <option value="">-- الأبعاد --</option>
                                    <template x-for="ar in scene.availableAspectRatios" :key="ar">
                                        <option :value="ar" x-text="ar"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" x-model="scene.newAudio" :id="'audio-toggle-' + scene.id" class="rounded">
                                <label :for="'audio-toggle-' + scene.id" class="text-sm text-gray-600">مع صوت</label>
                            </div>
                            <div class="flex gap-2 flex-wrap">
                                <button
                                    @click="submitGeneration(scene)"
                                    :disabled="!scene.newPrompt || !scene.newModel || scene.submitting"
                                    class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    <span x-show="!scene.submitting" x-text="scene.generations.length > 0 ? 'توليد محاولة جديدة' : 'توليد'"></span>
                                    <span x-show="scene.submitting">جاري الإرسال...</span>
                                </button>
                                <button
                                    @click="saveDraft(scene)"
                                    :disabled="!scene.newPrompt || scene.savingDraft"
                                    class="bg-amber-500 hover:bg-amber-600 text-white py-2 px-4 rounded disabled:opacity-50 disabled:cursor-not-allowed"
                                    title="حفظ النص والإعدادات بدون توليد"
                                >
                                    <span x-show="!scene.savingDraft && !scene.draftSaved">💾 حفظ كمسودة</span>
                                    <span x-show="scene.savingDraft">جاري الحفظ...</span>
                                    <span x-show="scene.draftSaved && !scene.savingDraft">✅ محفوظ</span>
                                </button>
                                <button
                                    x-show="scene.hasDraft"
                                    @click="clearDraft(scene)"
                                    class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-3 rounded text-sm"
                                    title="مسح المسودة"
                                >🗑️</button>
                            </div>
                        </div>
                    </div>

                    <!-- Generations grid -->
                    <div x-show="scene.generations.length > 0" class="grid grid-cols-1 lg:grid-cols-2 gap-3">
                        <template x-for="gen in scene.generations" :key="gen.id">
                            <div class="border rounded-lg p-3 bg-white shadow-sm flex flex-col">
                                <!-- Card header -->
                                <div class="flex justify-between items-start mb-2 pb-2 border-b">
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="text-sm font-bold text-indigo-700" x-text="'محاولة ' + gen.attempt_number"></span>
                                        <span class="text-xs font-mono bg-gray-200 px-2 py-0.5 rounded" x-text="gen.model"></span>
                                        <span
                                            class="text-xs px-2 py-0.5 rounded"
                                            :class="{
                                                'bg-green-100 text-green-700': gen.status === 'completed',
                                                'bg-red-100 text-red-700': gen.status === 'failed',
                                                'bg-blue-100 text-blue-700': ['pending','in_progress','processing','queued'].includes(gen.status),
                                                'bg-gray-100 text-gray-600': !['completed','failed','pending','in_progress','processing','queued'].includes(gen.status),
                                            }"
                                            x-text="gen.status"
                                        ></span>
                                    </div>
                                    <button
                                        x-show="(isAssigned || isAdmin) && gen.status !== 'pending' && gen.status !== 'in_progress'"
                                        @click="deleteGeneration(gen.id)"
                                        class="text-red-400 hover:text-red-600 text-sm"
                                        title="حذف"
                                    >🗑️</button>
                                </div>

                                <!-- Params -->
                                <div class="flex flex-wrap gap-1 mb-2 text-xs text-gray-500">
                                    <template x-if="gen.resolution">
                                        <span class="bg-gray-100 px-2 py-0.5 rounded" x-text="gen.resolution"></span>
                                    </template>
                                    <template x-if="gen.aspect_ratio">
                                        <span class="bg-gray-100 px-2 py-0.5 rounded" x-text="gen.aspect_ratio"></span>
                                    </template>
                                    <template x-if="gen.generate_audio">
                                        <span class="bg-gray-100 px-2 py-0.5 rounded">🔊 صوت</span>
                                    </template>
                                    <template x-if="gen.cost != null">
                                        <span
                                            class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-semibold"
                                            :title="'$' + (gen.cost != null ? gen.cost.toFixed(4) : '')"
                                            x-text="'💶 ' + formatEur(gen.cost * (credits ? credits.usd_to_eur_rate : 0.92))"
                                        ></span>
                                    </template>
                                </div>

                                <!-- Prompt with expand -->
                                <div class="mb-2">
                                    <p
                                        class="text-sm text-gray-700 whitespace-pre-wrap"
                                        :class="gen.promptExpanded ? '' : 'line-clamp-2'"
                                        x-text="gen.prompt"
                                    ></p>
                                    <button
                                        x-show="gen.prompt && gen.prompt.length > 80"
                                        @click="gen.promptExpanded = !gen.promptExpanded"
                                        class="text-xs text-blue-500 hover:text-blue-700 mt-1 flex items-center gap-1"
                                    >
                                        <span x-text="gen.promptExpanded ? '🔼 إخفاء النص' : '🔽 عرض النص كاملاً'"></span>
                                    </button>
                                </div>

                                <!-- Status messages -->
                                <div x-show="['pending','in_progress','processing','queued'].includes(gen.status)" class="text-sm text-blue-600 mb-2">
                                    <span x-text="gen.status === 'pending' ? 'في الانتظار...' : 'جاري التوليد...'"></span>
                                    <button
                                        @click="checkStatus(gen)"
                                        class="mr-2 text-xs text-gray-500 hover:text-blue-500 underline"
                                    >تحديث الحالة يدوياً</button>
                                </div>
                                <div x-show="gen.status === 'failed'" class="text-sm text-red-600 mb-2" x-text="gen.error_message || 'فشل التوليد'"></div>

                                <!-- Auto-pipeline progress -->
                                <div x-show="gen.status === 'completed' && gen.autoProcessing" class="text-sm text-indigo-600 mb-2 flex items-center gap-2">
                                    <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
                                        <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" class="opacity-75"/>
                                    </svg>
                                    <span x-text="gen.downloading ? 'جاري التحميل...' : (gen.saving ? 'جاري الرفع إلى Drive...' : 'جاري المعالجة...')"></span>
                                </div>
                                <div x-show="gen.autoError" class="text-xs text-amber-600 mb-2" x-text="gen.autoError"></div>

                                <!-- Actions for completed -->
                                <div x-show="gen.status === 'completed'" class="flex gap-2 flex-wrap mt-auto pt-2">
                                    <button
                                        x-show="!gen.drive_file_id && !gen.local_path && !gen.autoProcessing"
                                        type="button"
                                        @click="downloadVideo(gen.id)"
                                        :disabled="gen.downloading"
                                        class="bg-green-500 hover:bg-green-600 text-white text-xs py-1 px-3 rounded disabled:opacity-50"
                                    >
                                        <span x-show="!gen.downloading">⬇️ تحميل</span>
                                        <span x-show="gen.downloading">جاري التحميل...</span>
                                    </button>
                                    <button
                                        x-show="gen.local_path && !gen.drive_file_id && !gen.autoProcessing"
                                        type="button"
                                        @click="saveToDrive(gen.id)"
                                        :disabled="gen.saving"
                                        class="bg-indigo-500 hover:bg-indigo-600 text-white text-xs py-1 px-3 rounded disabled:opacity-50"
                                    >
                                        <span x-show="!gen.saving">☁️ حفظ في Drive</span>
                                        <span x-show="gen.saving">جاري الرفع...</span>
                                    </button>
                                    <button
                                        x-show="gen.drive_file_id"
                                        type="button"
                                        @click="playVideo(gen)"
                                        class="bg-purple-500 hover:bg-purple-600 text-white text-xs py-1 px-3 rounded"
                                    >
                                        <span x-text="gen.showPlayer ? '⏸️ إخفاء' : '▶️ تشغيل'"></span>
                                    </button>
                                </div>

                                <!-- Video Player -->
                                <template x-if="gen.showPlayer && gen.drive_file_id">
                                    <div class="mt-2">
                                        <video
                                            :src="'/api/generations/' + gen.id + '/stream'"
                                            class="w-full aspect-video rounded bg-black"
                                            controls
                                            preload="metadata"
                                            playsinline
                                        ></video>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <div x-show="scene.generations.length === 0" class="text-center text-gray-400 text-sm py-4">
                        لا توجد عمليات توليد بعد.
                    </div>
                </div>
            </div>
        </template>

        <!-- Add Scene Button -->
        <button
            x-show="isAssigned || isAdmin"
            @click="addScene()"
            :disabled="addingScene"
            class="w-full border-2 border-dashed border-gray-300 hover:border-blue-400 text-gray-500 hover:text-blue-500 py-3 rounded-lg transition"
        >
            <span x-show="!addingScene">+ إضافة مشهد جديد</span>
            <span x-show="addingScene">جاري الإضافة...</span>
        </button>

        <div x-show="scenes.length === 0 && !(isAssigned || isAdmin)" class="text-center text-gray-400 py-4">
            لا توجد مشاهد بعد.
        </div>
    </div>
</div>
